on:
  workflow_call:
    inputs:
      run-actionlint:
        required: false
        type: boolean
        default: true
      run-zizmor:
        required: false
        type: boolean
        default: true
      zizmor-advanced-security:
        description: Upload zizmor results to GitHub Advanced Security. Leave unset to auto-enable for public repos, or set to "true"/"false" to override.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  actionlint:
    uses: ./.github/workflows/actionlint.yml
    if: inputs.run-actionlint

  zizmor:
    uses: ./.github/workflows/zizmor.yml
    if: inputs.run-zizmor
    with:
      advanced-security: ${{ inputs.zizmor-advanced-security }}
    permissions:
      contents: read
      security-events: write
