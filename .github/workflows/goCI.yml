on:
  workflow_call:
    inputs:
      build-command:
        required: false
        type: string
        default: 'V=1 make build'
      codeql-build-cmd:
        required: false
        type: string
        default: 'V=1 make build'
      codeql-make-bootstrap:
        required: false
        type: boolean
      golangci-lint-version:
        required: false
        type: string
        default: latest
      golangci-lint-args:
        required: false
        type: string
        default: '--timeout=30m'
      goprivate:
        required: false
        type: string
        default: go.step.sm,github.com/smallstep
      only-latest-golang:
        required: false
        type: boolean
        default: true
      os-dependencies:
        required: false
        type: string
      run-actionlint:
        required: false
        type: boolean
        default: true
      run-build:
        required: false
        type: boolean
        default: true
      run-codecov:
        required: false
        type: boolean
        default: true
      run-codeql:
        required: false
        type: boolean
        default: false
      run-govulncheck:
        required: false
        type: boolean
        default: true
      run-lint:
        required: false
        type: boolean
        default: true
      run-test:
        required: false
        type: boolean
        default: true
      setup-bats:
        required: false
        type: boolean
        default: false
      test-command:
        required: false
        type: string
        default: 'gotestsum -- -coverpkg=./... -coverprofile=coverage.out -covermode=atomic ./...'
      lint-skip-go-generate:
        required: false
        type: boolean
        default: false
      lint-skip-go-mod-tidy:
        required: false
        type: boolean
        default: true
    secrets:
      SSH_PRIVATE_KEY:
        required: false
      PAT:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  actionlint:
    runs-on: ubuntu-latest
    if: inputs.run-actionlint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check workflow files
        uses: docker://index.docker.io/rhysd/actionlint@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f # 1.7.11
        with:
          args: -color

  lint:
    uses: ./.github/workflows/goLint.yml
    if: inputs.run-lint
    with:
      goprivate: ${{ inputs.goprivate }}
      golangci-lint-version: ${{ inputs.golangci-lint-version }}
      golangci-lint-args: ${{ inputs.golangci-lint-args }}
      os-dependencies: ${{ inputs.os-dependencies }}
      skip-go-generate: ${{ inputs.lint-skip-go-generate }}
      skip-go-mod-tidy: ${{ inputs.lint-skip-go-mod-tidy }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PAT: ${{ secrets.PAT }}

  govulncheck:
    uses: ./.github/workflows/govulncheck.yml
    if: inputs.run-govulncheck
    with:
      os-dependencies: ${{ inputs.os-dependencies }}
      goprivate: ${{ inputs.goprivate }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PAT: ${{ secrets.PAT }}

  codeql:
    if: inputs.run-codeql
    uses: ./.github/workflows/codeql-analysis.yml
    with:
      goprivate: ${{ inputs.goprivate }}
      os-dependencies: ${{ inputs.os-dependencies }}
      codeql-make-bootstrap: ${{ inputs.codeql-make-bootstrap }}
      codeql-build-cmd: ${{ inputs.codeql-build-cmd }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PAT: ${{ secrets.PAT }}

  test:
    uses: ./.github/workflows/goTest.yml
    if: inputs.run-test
    with:
      goprivate: ${{ inputs.goprivate }}
      only-latest-golang: ${{ inputs.only-latest-golang }}
      os-dependencies: ${{ inputs.os-dependencies }}
      run-codecov: ${{ inputs.run-codecov }}
      setup-bats: ${{ inputs.setup-bats }}
      test-command: ${{ inputs.test-command }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PAT: ${{ secrets.PAT }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    uses: ./.github/workflows/goBuild.yml
    if: inputs.run-build
    with:
      build-command: ${{ inputs.build-command }}
      goprivate: ${{ inputs.goprivate }}
      only-latest-golang: ${{ inputs.only-latest-golang }}
      os-dependencies: ${{ inputs.os-dependencies }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PAT: ${{ secrets.PAT }}
